<!DOCTYPE html>
<html>
<head>
    <title>Student Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
        }

        .form {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .list {
            margin-top: 30px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card span {
            font-size: 16px;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .delete-btn:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎓 Student Management</h1>

    <div class="form">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="course" placeholder="Course">
        <button onclick="addStudent()">Add</button>
    </div>

    <div class="list" id="studentList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
